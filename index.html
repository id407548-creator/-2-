<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamUp</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6fb;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

h1{
    color:#2563eb;
    margin-bottom:20px;
}

h2{
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.team{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    padding:15px;
    background:#eef3ff;
    border-radius:10px;
}

.deleteBtn{
    background:#ef4444;
}

.deleteBtn:hover{
    background:#dc2626;
}

.hidden{
    display:none;
}

@media(max-width:768px){
    .team{
        flex-direction:column;
        align-items:flex-start;
        gap:10px;
    }
}
</style>
</head>

<body>

<!-- 로그인 화면 -->
<div id="loginPage" class="container">

    <div class="card">
        <h1>TeamUp</h1>
        <h2>로그인</h2>

        <input type="text" id="nameInput" placeholder="이름">
        <input type="text" id="studentIdInput" placeholder="학번">

        <button onclick="login()">시작하기</button>
    </div>

</div>

<!-- 대시보드 -->
<div id="dashboard" class="container hidden">

    <div class="card">
        <h1>TeamUp Dashboard</h1>

        <p id="welcomeText"></p>

        <br>

        <button onclick="logout()">로그아웃</button>
    </div>

    <!-- 팀 생성 -->
    <div class="card">

        <h2>팀 생성</h2>

        <input type="text" id="teamName" placeholder="팀 이름">
        <input type="text" id="subjectName" placeholder="과목명">
        <textarea id="teamDesc" placeholder="팀 설명"></textarea>

        <button onclick="createTeam()">팀 생성</button>

    </div>

    <!-- 팀 목록 -->
    <div class="card">

        <h2>참여 중인 팀</h2>

        <div id="teamList"></div>

    </div>

</div>

<script>

let teams = JSON.parse(localStorage.getItem("teams")) || [];

function saveTeams(){
    localStorage.setItem("teams", JSON.stringify(teams));
}

function renderTeams(){

    const list = document.getElementById("teamList");

    list.innerHTML = "";

    if(teams.length === 0){
        list.innerHTML = "<p>생성된 팀이 없습니다.</p>";
        return;
    }

    teams.forEach((team,index)=>{

        list.innerHTML += `
        <div class="team">

            <div>
                <h3>${team.name}</h3>
                <p>${team.subject}</p>
                <small>${team.desc}</small>
            </div>

            <button class="deleteBtn"
            onclick="deleteTeam(${index})">
            삭제
            </button>

        </div>
        `;
    });

}

function createTeam(){

    const name = document.getElementById("teamName").value;
    const subject = document.getElementById("subjectName").value;
    const desc = document.getElementById("teamDesc").value;

    if(name === ""){
        alert("팀 이름을 입력하세요.");
        return;
    }

    teams.push({
        name,
        subject,
        desc
    });

    saveTeams();
    renderTeams();

    document.getElementById("teamName").value="";
    document.getElementById("subjectName").value="";
    document.getElementById("teamDesc").value="";
}

function deleteTeam(index){

    if(confirm("정말 삭제하시겠습니까?")){

        teams.splice(index,1);

        saveTeams();

        renderTeams();
    }

}

function login(){

    const name = document.getElementById("nameInput").value;
    const studentId = document.getElementById("studentIdInput").value;

    if(name==="" || studentId===""){
        alert("모든 정보를 입력하세요.");
        return;
    }

    localStorage.setItem("userName",name);
    localStorage.setItem("studentId",studentId);

    showDashboard();
}

function logout(){

    localStorage.removeItem("userName");
    localStorage.removeItem("studentId");

    location.reload();
}

function showDashboard(){

    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    const name = localStorage.getItem("userName");

    document.getElementById("welcomeText").innerHTML =
    `<b>${name}</b>님 환영합니다.`;
}

window.onload = ()=>{

    if(localStorage.getItem("userName")){
        showDashboard();
    }

    renderTeams();
}

</script>

</body>
</html>
