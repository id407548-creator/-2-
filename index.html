<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamUp Final</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6fb;margin:0}
.container{max-width:1000px;margin:auto;padding:20px}
.card{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
input,select{width:100%;padding:10px;margin:8px 0}
button{background:#2563eb;color:#fff;border:none;padding:10px 15px;border-radius:8px;cursor:pointer}
.delete{background:#ef4444}
.hidden{display:none}
.item{background:#eef3ff;padding:15px;border-radius:10px;margin-top:10px}
.stats{display:flex;gap:10px;flex-wrap:wrap}
.stat{flex:1;background:#dbeafe;padding:15px;border-radius:10px}
</style>
</head>
<body>
<div class="container">

<div id="loginPage" class="card">
<h1>TeamUp</h1>
<input id="nameInput" placeholder="이름">
<input id="studentInput" placeholder="학번">
<button onclick="login()">시작하기</button>
</div>

<div id="dashboard" class="hidden">

<div class="card">
<h2 id="welcome"></h2>
<button onclick="logout()">로그아웃</button>
</div>

<div class="card stats">
<div class="stat">팀 수<br><span id="teamCount"></span></div>
<div class="stat">Task 수<br><span id="taskCount"></span></div>
<div class="stat">일정 수<br><span id="scheduleCount"></span></div>
</div>

<div class="card">
<h2>팀 생성</h2>
<input id="teamName" placeholder="팀 이름">
<button onclick="createTeam()">생성</button>
<div id="teamList"></div>
</div>

<div class="card">
<h2>Task 추가</h2>
<input id="taskTitle" placeholder="역할 제목">
<input id="taskOwner" placeholder="담당자">
<input type="date" id="taskDate">
<select id="taskStatus">
<option>진행 전</option><option>진행 중</option><option>완료</option>
</select>
<button onclick="createTask()">추가</button>
<div id="taskList"></div>
</div>

<div class="card">
<h2>일정 추가</h2>
<input id="scheduleTitle" placeholder="일정 제목">
<input type="date" id="scheduleDate">
<button onclick="addSchedule()">추가</button>
<div id="scheduleList"></div>
</div>

</div></div>

<script>
let teams=JSON.parse(localStorage.getItem("teams"))||[];
let tasks=JSON.parse(localStorage.getItem("tasks"))||[];
let schedules=JSON.parse(localStorage.getItem("schedules"))||[];

function login(){localStorage.setItem("userName",nameInput.value);showDashboard();}
function logout(){localStorage.clear();location.reload();}
function showDashboard(){loginPage.classList.add("hidden");dashboard.classList.remove("hidden");welcome.innerText=localStorage.getItem("userName")+"님 환영합니다.";renderAll();}

function createTeam(){teams.push({name:teamName.value});localStorage.setItem("teams",JSON.stringify(teams));renderAll();}
function createTask(){tasks.push({title:taskTitle.value,owner:taskOwner.value,date:taskDate.value,status:taskStatus.value});localStorage.setItem("tasks",JSON.stringify(tasks));renderAll();}
function addSchedule(){schedules.push({title:scheduleTitle.value,date:scheduleDate.value});localStorage.setItem("schedules",JSON.stringify(schedules));renderAll();}

function renderAll(){
teamList.innerHTML=teams.map((t,i)=>`<div class='item'>${t.name}</div>`).join("");
taskList.innerHTML=tasks.map(t=>`<div class='item'>${t.title} (${t.status})</div>`).join("");
scheduleList.innerHTML=schedules.map(s=>`<div class='item'>${s.title} ${s.date}</div>`).join("");
teamCount.innerText=teams.length;
taskCount.innerText=tasks.length;
scheduleCount.innerText=schedules.length;
}

window.onload=()=>{if(localStorage.getItem("userName")) showDashboard();}
</script>
</body>
</html>
